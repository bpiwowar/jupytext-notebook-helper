# Build and publish the package to PyPI on a GitHub release.
# Uses PyPI trusted publishing (OIDC) — no API token needed.
name: Upload Python Package

on:
  release:
    types: [created]

jobs:
  deploy:
    permissions:
      contents: write  # update release notes
      id-token: write  # PyPI trusted publishing
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for hatch-vcs to determine the version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install hatch
        run: |
          python -m pip install --upgrade pip
          pip install hatch

      - name: Generate changelog for this release
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: release-notes.md

      - name: Update release notes
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md

      - name: Build the package
        run: hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
